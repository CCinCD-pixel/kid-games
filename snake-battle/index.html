<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇大作战</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            overflow: hidden;
            touch-action: none;
            font-family: system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .back-home {
            position: fixed;
            top: max(10px, env(safe-area-inset-top));
            left: 10px;
            z-index: 999;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 12px;
            padding: 8px 14px;
            color: white;
            font-size: 0.9em;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }
        .back-home:active { transform: scale(0.95); }

        /* HUD */
        .hud {
            position: fixed;
            top: max(10px, env(safe-area-inset-top));
            right: 10px;
            z-index: 100;
            color: white;
            font-weight: 700;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .hud-score {
            font-size: 1.3em;
            text-align: right;
        }
        .hud-rank {
            font-size: 0.85em;
            opacity: 0.7;
            text-align: right;
            margin-top: 2px;
        }

        /* Leaderboard */
        .leaderboard {
            position: fixed;
            top: max(60px, calc(env(safe-area-inset-top) + 50px));
            right: 10px;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 10px 14px;
            color: white;
            font-size: 0.75em;
            min-width: 120px;
        }
        .leaderboard h3 {
            font-size: 0.9em;
            margin-bottom: 6px;
            opacity: 0.7;
        }
        .lb-entry {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            gap: 8px;
        }
        .lb-entry.me { color: #f1c40f; font-weight: 800; }

        /* Death overlay */
        .death-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: white;
            text-align: center;
        }
        .death-overlay .emoji { font-size: 3em; margin-bottom: 10px; }
        .death-overlay .msg { font-size: 1.3em; font-weight: 700; margin-bottom: 6px; }
        .death-overlay .sub { opacity: 0.7; margin-bottom: 20px; }
        .death-overlay button {
            padding: 14px 36px;
            font-size: 1.1em;
            font-weight: 800;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #1a1a2e;
            cursor: pointer;
        }

        /* Start screen */
        .start-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .start-screen .icon { font-size: clamp(4em, 15vw, 6em); margin-bottom: 10px; }
        .start-screen h1 { font-size: clamp(1.5em, 6vw, 2.2em); font-weight: 900; margin-bottom: 8px; }
        .start-screen .desc { opacity: 0.6; margin-bottom: 24px; font-size: 0.95em; line-height: 1.5; }
        .start-screen .tip {
            background: rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 14px 20px;
            margin-bottom: 24px;
            font-size: 0.85em;
            line-height: 1.6;
            max-width: 320px;
        }
        .start-screen button {
            padding: 16px 48px;
            font-size: 1.3em;
            font-weight: 900;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(245,87,108,0.4);
        }
    </style>
</head>
<body>
    <a href="/" class="back-home">🏠 返回</a>
    <canvas id="canvas"></canvas>

    <div class="hud">
        <div class="hud-score">长度: <span id="hud-len">10</span></div>
        <div class="hud-rank">排名: <span id="hud-rank">-</span></div>
    </div>

    <div class="leaderboard" id="leaderboard"></div>

    <div class="start-screen" id="start-screen">
        <div class="icon">🐍</div>
        <h1>贪吃蛇大作战</h1>
        <div class="desc">吃食物变长，撞到别的蛇就会变成食物哦！</div>
        <div class="tip">
            🎯 用手指滑动控制方向<br>
            🍎 吃彩色小球变长<br>
            💀 碰到其他蛇的身体会死<br>
            ♻️ 死了可以马上重来！
        </div>
        <button id="btn-start">开始游戏！</button>
    </div>

    <div class="death-overlay" id="death-overlay" style="display:none;">
        <div class="emoji">💫</div>
        <div class="msg">哎呀！撞到了！</div>
        <div class="sub" id="death-score">你的长度: 10</div>
        <button id="btn-respawn">再来一次！</button>
    </div>

<script>
'use strict';

// ══════════════════════════════
//  CONFIG
// ══════════════════════════════
const WORLD_SIZE = 3000;
const FOOD_COUNT = 200;
const AI_COUNT = 7;
const INITIAL_LENGTH = 10;
const SEGMENT_RADIUS = 8;
const SEGMENT_SPACING = 12;
const SNAKE_SPEED = 2.5;
const AI_SPEED = 2.2;
const FOOD_RADIUS = 5;
const DEATH_FOOD_COUNT = 8; // food dropped on death

// ══════════════════════════════
//  CANVAS SETUP
// ══════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth * devicePixelRatio;
    H = canvas.height = window.innerHeight * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════
//  COLORS
// ══════════════════════════════
const SNAKE_COLORS = [
    ['#f1c40f', '#f39c12'], // yellow
    ['#e74c3c', '#c0392b'], // red
    ['#2ecc71', '#27ae60'], // green
    ['#3498db', '#2980b9'], // blue
    ['#9b59b6', '#8e44ad'], // purple
    ['#1abc9c', '#16a085'], // teal
    ['#e67e22', '#d35400'], // orange
    ['#fd79a8', '#e84393'], // pink
];

const FOOD_COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bd6','#a66cff','#ff9f43','#00d2d3'];

// ══════════════════════════════
//  GAME STATE
// ══════════════════════════════
let foods = [];
let snakes = [];
let player = null;
let camera = { x: 0, y: 0 };
let gameRunning = false;
let targetAngle = 0;
let touchActive = false;

// ══════════════════════════════
//  FOOD
// ══════════════════════════════
function spawnFood(x, y) {
    return {
        x: x !== undefined ? x : Math.random() * WORLD_SIZE,
        y: y !== undefined ? y : Math.random() * WORLD_SIZE,
        color: FOOD_COLORS[Math.floor(Math.random() * FOOD_COLORS.length)],
        radius: FOOD_RADIUS + Math.random() * 3,
        pulse: Math.random() * Math.PI * 2
    };
}

function initFoods() {
    foods = [];
    for (let i = 0; i < FOOD_COUNT; i++) {
        foods.push(spawnFood());
    }
}

// ══════════════════════════════
//  SNAKE
// ══════════════════════════════
function createSnake(isPlayer) {
    const x = 200 + Math.random() * (WORLD_SIZE - 400);
    const y = 200 + Math.random() * (WORLD_SIZE - 400);
    const angle = Math.random() * Math.PI * 2;
    const colorIdx = Math.floor(Math.random() * SNAKE_COLORS.length);

    const segments = [];
    for (let i = 0; i < INITIAL_LENGTH; i++) {
        segments.push({
            x: x - Math.cos(angle) * i * SEGMENT_SPACING,
            y: y - Math.sin(angle) * i * SEGMENT_SPACING
        });
    }

    const names = ['小花蛇','小青蛇','小红蛇','小金蛇','小紫蛇','小蓝蛇','小胖蛇','小快蛇','小灵蛇','小勇蛇'];

    return {
        segments,
        angle,
        targetAngle: angle,
        speed: isPlayer ? SNAKE_SPEED : AI_SPEED,
        colors: SNAKE_COLORS[colorIdx],
        isPlayer,
        alive: true,
        name: isPlayer ? '我' : names[Math.floor(Math.random() * names.length)],
        aiTimer: 0,
        aiTarget: null,
        length: INITIAL_LENGTH
    };
}

function growSnake(snake, amount) {
    for (let i = 0; i < amount; i++) {
        const last = snake.segments[snake.segments.length - 1];
        snake.segments.push({ x: last.x, y: last.y });
    }
    snake.length = snake.segments.length;
}

// ══════════════════════════════
//  AI
// ══════════════════════════════
function updateAI(snake, dt) {
    snake.aiTimer -= dt;

    // Find nearest food
    if (snake.aiTimer <= 0 || !snake.aiTarget) {
        snake.aiTimer = 0.5 + Math.random() * 1.5;
        let bestDist = Infinity;
        let bestFood = null;
        const head = snake.segments[0];

        for (const food of foods) {
            const dx = food.x - head.x;
            const dy = food.y - head.y;
            const dist = dx * dx + dy * dy;
            if (dist < bestDist) {
                bestDist = dist;
                bestFood = food;
            }
        }

        if (bestFood) {
            snake.aiTarget = bestFood;
        }
    }

    const head = snake.segments[0];

    // Avoid walls
    const wallMargin = 150;
    let avoidX = 0, avoidY = 0;
    if (head.x < wallMargin) avoidX = 1;
    if (head.x > WORLD_SIZE - wallMargin) avoidX = -1;
    if (head.y < wallMargin) avoidY = 1;
    if (head.y > WORLD_SIZE - wallMargin) avoidY = -1;

    if (avoidX || avoidY) {
        snake.targetAngle = Math.atan2(avoidY, avoidX);
    } else if (snake.aiTarget) {
        const dx = snake.aiTarget.x - head.x;
        const dy = snake.aiTarget.y - head.y;
        snake.targetAngle = Math.atan2(dy, dx);
    }

    // Avoid other snakes (simple)
    for (const other of snakes) {
        if (other === snake || !other.alive) continue;
        for (let i = 0; i < Math.min(other.segments.length, 20); i++) {
            const seg = other.segments[i];
            const dx = seg.x - head.x;
            const dy = seg.y - head.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 40) {
                // Steer away
                snake.targetAngle = Math.atan2(-dy, -dx);
                snake.aiTimer = 0; // recalculate soon
                break;
            }
        }
    }
}

// ══════════════════════════════
//  MOVEMENT
// ══════════════════════════════
function moveSnake(snake, dt) {
    if (!snake.alive) return;

    // Smoothly turn toward target angle
    let diff = snake.targetAngle - snake.angle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    const turnSpeed = 4;
    snake.angle += Math.sign(diff) * Math.min(Math.abs(diff), turnSpeed * dt);

    // Move head
    const head = snake.segments[0];
    const nx = head.x + Math.cos(snake.angle) * snake.speed * dt * 60;
    const ny = head.y + Math.sin(snake.angle) * snake.speed * dt * 60;

    // World boundary
    const bounded = {
        x: Math.max(SEGMENT_RADIUS, Math.min(WORLD_SIZE - SEGMENT_RADIUS, nx)),
        y: Math.max(SEGMENT_RADIUS, Math.min(WORLD_SIZE - SEGMENT_RADIUS, ny))
    };

    // Shift segments
    for (let i = snake.segments.length - 1; i > 0; i--) {
        const prev = snake.segments[i - 1];
        const seg = snake.segments[i];
        const dx = prev.x - seg.x;
        const dy = prev.y - seg.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > SEGMENT_SPACING) {
            const ratio = SEGMENT_SPACING / dist;
            seg.x = prev.x - dx * ratio;
            seg.y = prev.y - dy * ratio;
        }
    }

    head.x = bounded.x;
    head.y = bounded.y;
}

// ══════════════════════════════
//  COLLISION
// ══════════════════════════════
function checkCollisions() {
    for (const snake of snakes) {
        if (!snake.alive) continue;
        const head = snake.segments[0];
        const headR = SEGMENT_RADIUS;

        // Food collision
        for (let i = foods.length - 1; i >= 0; i--) {
            const food = foods[i];
            const dx = food.x - head.x;
            const dy = food.y - head.y;
            if (dx * dx + dy * dy < (headR + food.radius) * (headR + food.radius)) {
                foods.splice(i, 1);
                growSnake(snake, 1);
                // Respawn food
                foods.push(spawnFood());
            }
        }

        // Snake-to-snake collision (head vs body)
        for (const other of snakes) {
            if (other === snake || !other.alive) continue;
            // Skip first 3 segments (head area) to prevent false hits
            for (let i = 3; i < other.segments.length; i++) {
                const seg = other.segments[i];
                const dx = seg.x - head.x;
                const dy = seg.y - head.y;
                if (dx * dx + dy * dy < (headR + SEGMENT_RADIUS - 2) * (headR + SEGMENT_RADIUS - 2)) {
                    killSnake(snake);
                    break;
                }
            }
            if (!snake.alive) break;
        }
    }
}

function killSnake(snake) {
    snake.alive = false;

    // Drop food from body
    const step = Math.max(1, Math.floor(snake.segments.length / DEATH_FOOD_COUNT));
    for (let i = 0; i < snake.segments.length; i += step) {
        const seg = snake.segments[i];
        foods.push(spawnFood(
            seg.x + (Math.random() - 0.5) * 20,
            seg.y + (Math.random() - 0.5) * 20
        ));
    }

    if (snake.isPlayer) {
        showDeath();
    } else {
        // Respawn AI after delay
        setTimeout(() => {
            const idx = snakes.indexOf(snake);
            if (idx >= 0) {
                snakes[idx] = createSnake(false);
            }
        }, 2000);
    }
}

// ══════════════════════════════
//  RENDERING
// ══════════════════════════════
function render() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    ctx.clearRect(0, 0, vw, vh);

    // Camera follows player
    if (player && player.alive) {
        camera.x = player.segments[0].x - vw / 2;
        camera.y = player.segments[0].y - vh / 2;
    }

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Background grid
    drawGrid(vw, vh);

    // World border
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 3;
    ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

    // Food
    const time = Date.now() / 1000;
    for (const food of foods) {
        // Only draw if on screen
        if (food.x < camera.x - 20 || food.x > camera.x + vw + 20 ||
            food.y < camera.y - 20 || food.y > camera.y + vh + 20) continue;

        const pulse = 1 + Math.sin(time * 3 + food.pulse) * 0.2;
        ctx.beginPath();
        ctx.arc(food.x, food.y, food.radius * pulse, 0, Math.PI * 2);
        ctx.fillStyle = food.color;
        ctx.fill();
    }

    // Snakes
    for (const snake of snakes) {
        if (!snake.alive) continue;
        drawSnake(snake);
    }

    ctx.restore();

    // Minimap
    drawMinimap(vw, vh);
}

function drawGrid(vw, vh) {
    const gridSize = 50;
    const startX = Math.floor(camera.x / gridSize) * gridSize;
    const startY = Math.floor(camera.y / gridSize) * gridSize;

    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = startX; x < camera.x + vw + gridSize; x += gridSize) {
        if (x < 0 || x > WORLD_SIZE) continue;
        ctx.moveTo(x, Math.max(0, camera.y));
        ctx.lineTo(x, Math.min(WORLD_SIZE, camera.y + vh));
    }
    for (let y = startY; y < camera.y + vh + gridSize; y += gridSize) {
        if (y < 0 || y > WORLD_SIZE) continue;
        ctx.moveTo(Math.max(0, camera.x), y);
        ctx.lineTo(Math.min(WORLD_SIZE, camera.x + vw), y);
    }
    ctx.stroke();
}

function drawSnake(snake) {
    const segs = snake.segments;
    const [c1, c2] = snake.colors;

    // Body
    for (let i = segs.length - 1; i >= 0; i--) {
        const seg = segs[i];
        const t = i / segs.length;
        const r = SEGMENT_RADIUS * (0.5 + (1 - t) * 0.5); // taper tail

        ctx.beginPath();
        ctx.arc(seg.x, seg.y, r, 0, Math.PI * 2);

        // Alternate colors
        ctx.fillStyle = i % 2 === 0 ? c1 : c2;
        ctx.fill();
    }

    // Eyes on head
    const head = segs[0];
    const eyeOffset = SEGMENT_RADIUS * 0.4;
    const eyeR = SEGMENT_RADIUS * 0.3;
    const perpAngle = snake.angle + Math.PI / 2;

    for (const side of [-1, 1]) {
        const ex = head.x + Math.cos(snake.angle) * eyeOffset * 0.5 + Math.cos(perpAngle) * eyeOffset * side;
        const ey = head.y + Math.sin(snake.angle) * eyeOffset * 0.5 + Math.sin(perpAngle) * eyeOffset * side;

        // White
        ctx.beginPath();
        ctx.arc(ex, ey, eyeR, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();

        // Pupil
        ctx.beginPath();
        ctx.arc(
            ex + Math.cos(snake.angle) * eyeR * 0.3,
            ey + Math.sin(snake.angle) * eyeR * 0.3,
            eyeR * 0.5, 0, Math.PI * 2
        );
        ctx.fillStyle = '#111';
        ctx.fill();
    }

    // Name above head
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = 'bold 11px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(snake.name, head.x, head.y - SEGMENT_RADIUS - 8);
}

function drawMinimap(vw, vh) {
    const size = 90;
    const margin = 10;
    const mx = margin;
    const my = vh - size - margin - 10;
    const scale = size / WORLD_SIZE;

    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(mx, my, size, size);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx, my, size, size);

    // Snakes on minimap
    for (const snake of snakes) {
        if (!snake.alive) continue;
        const head = snake.segments[0];
        const px = mx + head.x * scale;
        const py = my + head.y * scale;
        ctx.beginPath();
        ctx.arc(px, py, snake.isPlayer ? 3 : 2, 0, Math.PI * 2);
        ctx.fillStyle = snake.isPlayer ? '#f1c40f' : snake.colors[0];
        ctx.fill();
    }

    // Viewport rectangle
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.strokeRect(
        mx + camera.x * scale,
        my + camera.y * scale,
        vw * scale,
        vh * scale
    );
}

// ══════════════════════════════
//  HUD
// ══════════════════════════════
function updateHUD() {
    if (!player) return;
    document.getElementById('hud-len').textContent = player.length;

    // Rank
    const alive = snakes.filter(s => s.alive).sort((a, b) => b.length - a.length);
    const rank = alive.indexOf(player) + 1;
    document.getElementById('hud-rank').textContent = rank > 0 ? `#${rank}` : '-';

    // Leaderboard
    const top5 = alive.slice(0, 5);
    let html = '<h3>🏆 排行榜</h3>';
    top5.forEach((s, i) => {
        const cls = s.isPlayer ? ' me' : '';
        html += `<div class="lb-entry${cls}"><span>${i + 1}. ${s.name}</span><span>${s.length}</span></div>`;
    });
    document.getElementById('leaderboard').innerHTML = html;
}

// ══════════════════════════════
//  TOUCH INPUT
// ══════════════════════════════
let touchPos = null;

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    touchPos = { x: t.clientX, y: t.clientY };
    touchActive = true;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    touchPos = { x: t.clientX, y: t.clientY };
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    touchActive = false;
}, { passive: false });

// Mouse input (for PC testing)
canvas.addEventListener('mousemove', (e) => {
    if (!gameRunning) return;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    targetAngle = Math.atan2(e.clientY - vh / 2, e.clientX - vw / 2);
    if (player && player.alive) {
        player.targetAngle = targetAngle;
    }
});

function updateTouchInput() {
    if (!touchActive || !touchPos || !player || !player.alive) return;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const dx = touchPos.x - vw / 2;
    const dy = touchPos.y - vh / 2;
    // Only update if finger is far enough from center
    if (dx * dx + dy * dy > 400) {
        player.targetAngle = Math.atan2(dy, dx);
    }
}

// Keyboard input
document.addEventListener('keydown', (e) => {
    if (!player || !player.alive) return;
    switch(e.key) {
        case 'ArrowUp':    case 'w': player.targetAngle = -Math.PI / 2; break;
        case 'ArrowDown':  case 's': player.targetAngle = Math.PI / 2;  break;
        case 'ArrowLeft':  case 'a': player.targetAngle = Math.PI;      break;
        case 'ArrowRight': case 'd': player.targetAngle = 0;            break;
    }
});

// ══════════════════════════════
//  GAME LOOP
// ══════════════════════════════
let lastTime = 0;
let hudTimer = 0;

function gameLoop(timestamp) {
    if (!gameRunning) return;

    const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap delta
    lastTime = timestamp;

    // Update touch input
    updateTouchInput();

    // Update AI
    for (const snake of snakes) {
        if (!snake.isPlayer && snake.alive) {
            updateAI(snake, dt);
        }
    }

    // Move all snakes
    for (const snake of snakes) {
        moveSnake(snake, dt);
    }

    // Collisions
    checkCollisions();

    // Render
    render();

    // HUD update (throttled)
    hudTimer += dt;
    if (hudTimer > 0.3) {
        hudTimer = 0;
        updateHUD();
    }

    requestAnimationFrame(gameLoop);
}

// ══════════════════════════════
//  GAME FLOW
// ══════════════════════════════
function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('death-overlay').style.display = 'none';

    initFoods();
    snakes = [];

    // Create AI snakes
    for (let i = 0; i < AI_COUNT; i++) {
        snakes.push(createSnake(false));
    }

    // Create player
    player = createSnake(true);
    player.colors = ['#f1c40f', '#f39c12']; // always yellow
    snakes.push(player);

    gameRunning = true;
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
}

function showDeath() {
    document.getElementById('death-score').textContent = `你的长度: ${player.length}`;
    document.getElementById('death-overlay').style.display = 'flex';
}

function respawn() {
    document.getElementById('death-overlay').style.display = 'none';

    // Remove old player
    const idx = snakes.indexOf(player);
    if (idx >= 0) snakes.splice(idx, 1);

    // Create new player
    player = createSnake(true);
    player.colors = ['#f1c40f', '#f39c12'];
    snakes.push(player);
}

// Event listeners
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-respawn').addEventListener('click', respawn);

// Audio
function playTone(freq, dur) {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
}
