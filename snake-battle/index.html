<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>贪吃蛇大作战</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
  </head>
  <body>
    <a href="../index.html" class="back-home">🏠 返回</a>
    <canvas id="canvas"></canvas>

    <div class="hud">
      <div class="hud-score">长度: <span id="hud-len">10</span></div>
      <div class="hud-rank">排名: <span id="hud-rank">-</span></div>
    </div>

    <div class="leaderboard" id="leaderboard"></div>

    <div class="start-screen" id="start-screen">
      <div class="icon">🐍</div>
      <h1>贪吃蛇大作战</h1>
      <div class="desc">吃食物变长，撞到别的蛇就会变成食物哦！</div>
      <div class="tip">
        🎯 用手指滑动控制方向<br />
        🍎 吃彩色小球变长变粗<br />
        💀 碰到其他蛇或撞墙会死<br />
        ♻️ 死了可以马上重来！
      </div>
      <button id="btn-start">开始游戏！</button>
    </div>

    <div class="death-overlay" id="death-overlay" style="display: none">
      <div class="emoji">💫</div>
      <div class="msg">哎呀！撞到了！</div>
      <div class="sub" id="death-score">你的长度: 10</div>
      <button id="btn-respawn">再来一次！</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
