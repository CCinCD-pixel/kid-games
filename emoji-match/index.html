<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>表情消消乐</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <style>
        :root {
            --bg-top: #fff4d6;
            --bg-bottom: #ffd6e0;
            --panel: rgba(255, 255, 255, 0.72);
            --line: rgba(84, 59, 45, 0.12);
            --text: #53392d;
            --muted: rgba(83, 57, 45, 0.68);
            --accent: #ff8fab;
            --accent-2: #f4b942;
            --good: #4caf50;
            --danger: #ff6b6b;
            --grid-size: 5;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "PingFang SC", "Helvetica Neue", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 26%),
                radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.48), transparent 20%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
            padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
        }

        .back-home {
            position: fixed;
            top: max(12px, env(safe-area-inset-top));
            left: 12px;
            z-index: 30;
            padding: 10px 14px;
            border-radius: 999px;
            text-decoration: none;
            color: var(--text);
            background: rgba(255, 255, 255, 0.68);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.08);
            font-weight: 800;
            backdrop-filter: blur(10px);
        }

        .app {
            width: min(980px, 100%);
            margin: 0 auto;
            padding: 56px 0 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 18px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3.1rem);
        }

        .hero p {
            margin: 10px auto 0;
            max-width: 620px;
            color: var(--muted);
            line-height: 1.55;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 30px;
            box-shadow: 0 16px 40px rgba(133, 94, 66, 0.12);
            backdrop-filter: blur(12px);
            padding: 18px;
        }

        .top-row,
        .hud,
        .goal-list,
        .button-row,
        .result-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .top-row,
        .hud,
        .result-actions {
            justify-content: space-between;
        }

        .section-title {
            margin: 0;
        }

        .muted {
            color: var(--muted);
        }

        .pill,
        .chip,
        .goal-chip,
        .legend-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.7);
            font-size: 0.92rem;
        }

        .ladder-grid {
            margin-top: 18px;
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        }

        .ladder-card,
        .level-pill,
        .tile,
        .ghost-btn,
        .primary-btn,
        .mini-btn {
            touch-action: manipulation;
        }

        .ladder-card {
            border: 2px solid transparent;
            border-radius: 24px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.48));
            padding: 18px;
            cursor: pointer;
            text-align: left;
        }

        .ladder-card:active,
        .tile:active,
        .ghost-btn:active,
        .primary-btn:active,
        .mini-btn:active {
            transform: scale(0.98);
        }

        .ladder-card h3 {
            margin: 14px 0 0;
            font-size: 1.35rem;
        }

        .ladder-card .meta {
            margin-top: 14px;
            display: grid;
            gap: 6px;
            color: var(--muted);
        }

        .summary-grid {
            margin-top: 18px;
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        }

        .summary-card {
            padding: 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.76);
        }

        .summary-card strong {
            display: block;
            margin-top: 8px;
            font-size: 1.28rem;
        }

        .progress-track {
            margin-top: 14px;
            height: 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.6);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: inherit;
            width: 0;
            background: linear-gradient(90deg, #ff8fab, #f4b942);
        }

        .levels-grid {
            margin-top: 18px;
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fill, minmax(68px, 1fr));
        }

        .level-pill {
            min-height: 68px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.76);
            background: rgba(255, 255, 255, 0.58);
            font-weight: 900;
            font-size: 1rem;
            color: var(--text);
            cursor: pointer;
            position: relative;
        }

        .level-pill.done {
            background: rgba(135, 235, 175, 0.52);
        }

        .level-pill.current {
            box-shadow: 0 0 0 2px rgba(255, 143, 171, 0.76);
        }

        .level-pill.locked {
            opacity: 0.38;
            cursor: not-allowed;
        }

        .level-pill .badge {
            position: absolute;
            right: 8px;
            bottom: 6px;
            font-size: 0.72rem;
        }

        .ghost-btn,
        .primary-btn,
        .mini-btn {
            border: none;
            cursor: pointer;
            font-weight: 900;
        }

        .ghost-btn,
        .primary-btn {
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 0.96rem;
        }

        .ghost-btn,
        .mini-btn {
            background: rgba(255, 255, 255, 0.7);
            color: var(--text);
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
        }

        .mini-btn {
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.88rem;
        }

        .hud-chip {
            min-width: 95px;
            padding: 10px 12px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.76);
        }

        .hud-chip span {
            display: block;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .hud-chip strong {
            display: block;
            margin-top: 4px;
            font-size: 1.08rem;
        }

        .goal-zone {
            margin-top: 14px;
            padding: 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.76);
        }

        .goal-chip {
            font-size: 1rem;
        }

        .goal-chip.done {
            background: rgba(135, 235, 175, 0.56);
        }

        .status-box {
            text-align: center;
            min-height: 62px;
            margin: 12px 0 8px;
        }

        .status-title {
            font-size: 1.22rem;
            font-weight: 900;
        }

        .status-text {
            margin-top: 6px;
            color: var(--muted);
            line-height: 1.5;
        }

        .legend {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .board-shell {
            width: min(92vw, 560px);
            margin: 14px auto 6px;
            position: relative;
        }

        .effect-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 4;
        }

        .combo-banner {
            position: absolute;
            left: 50%;
            top: 14px;
            transform: translateX(-50%) scale(0.7);
            padding: 10px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, #ff8fab, #f4b942);
            color: white;
            font-weight: 900;
            opacity: 0;
            box-shadow: 0 10px 24px rgba(255, 143, 171, 0.38);
        }

        .combo-banner.show {
            animation: combo-pop 1.05s ease forwards;
        }

        .match-board {
            width: min(92vw, 560px);
            display: grid;
            grid-template-columns: repeat(var(--grid-size), minmax(0, 1fr));
            gap: 8px;
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.34);
            padding: 10px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.76);
            box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.85), 0 14px 26px rgba(255, 182, 193, 0.2);
            transition: transform 0.14s ease;
            touch-action: none;
            position: relative;
            z-index: 2;
        }

        .tile {
            border: none;
            border-radius: 18px;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.88), transparent 45%),
                linear-gradient(160deg, #fff6ef, #ffe5d9);
            position: relative;
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            cursor: pointer;
            box-shadow: inset 0 -6px 10px rgba(255, 182, 193, 0.22);
            transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
            user-select: none;
            overflow: hidden;
        }

        .tile.selected {
            box-shadow: 0 0 0 4px rgba(255, 143, 171, 0.82), inset 0 -6px 10px rgba(255, 182, 193, 0.22);
            transform: translateY(-2px) scale(1.04);
        }

        .tile.drag-source {
            filter: brightness(1.05);
            box-shadow: 0 0 0 4px rgba(244, 185, 66, 0.92), inset 0 -6px 10px rgba(255, 182, 193, 0.22);
        }

        .tile.clearing {
            animation: pop-out 0.32s ease forwards;
        }

        .tile.from-left { animation: swap-from-left 0.22s ease; }
        .tile.from-right { animation: swap-from-right 0.22s ease; }
        .tile.from-up { animation: swap-from-up 0.22s ease; }
        .tile.from-down { animation: swap-from-down 0.22s ease; }
        .tile.special-fire { animation: special-pulse 0.42s ease; }
        .tile.bad-swap { animation: invalid-nudge 0.34s ease; }

        .tile.empty {
            opacity: 0.25;
        }

        .emoji {
            display: inline-block;
            transform: translateY(2px);
            position: relative;
            z-index: 2;
        }

        .tile.special-row::before,
        .tile.special-col::before,
        .tile.special-bomb::before,
        .tile.special-rainbow::before,
        .tile.special-rainbow::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .tile.special-row {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.18)),
                linear-gradient(180deg, #fff6ef, #ffe5d9);
            box-shadow:
                inset 0 -6px 10px rgba(255, 182, 193, 0.22),
                0 0 0 3px rgba(255, 143, 171, 0.22);
        }

        .tile.special-row::before {
            background:
                repeating-linear-gradient(
                    180deg,
                    rgba(255, 255, 255, 0.08) 0 10px,
                    rgba(255, 111, 145, 0.42) 10px 18px
                );
        }

        .tile.special-col {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.18)),
                linear-gradient(180deg, #fff6ef, #ffe5d9);
            box-shadow:
                inset 0 -6px 10px rgba(255, 182, 193, 0.22),
                0 0 0 3px rgba(123, 211, 255, 0.28);
        }

        .tile.special-col::before {
            background:
                repeating-linear-gradient(
                    90deg,
                    rgba(255, 255, 255, 0.08) 0 10px,
                    rgba(120, 200, 255, 0.42) 10px 18px
                );
        }

        .tile.special-bomb {
            background:
                radial-gradient(circle at center, rgba(255,255,255,0.95) 0 14%, rgba(255, 214, 10, 0.75) 15% 32%, rgba(255, 128, 87, 0.8) 33% 54%, rgba(255,255,255,0.08) 55%),
                linear-gradient(180deg, #fff6ef, #ffe5d9);
            box-shadow:
                inset 0 -6px 10px rgba(255, 182, 193, 0.22),
                0 0 0 3px rgba(255, 190, 11, 0.32);
        }

        .tile.special-bomb::before {
            inset: 10%;
            border-radius: 50%;
            border: 4px dashed rgba(255, 255, 255, 0.78);
            animation: bomb-spin 3s linear infinite;
        }

        .tile.special-rainbow {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.16)),
                conic-gradient(from 0deg, #ff8fab, #ffd166, #8ecae6, #80ed99, #cdb4db, #ff8fab);
            box-shadow:
                inset 0 -6px 10px rgba(255, 255, 255, 0.18),
                0 0 0 4px rgba(255, 255, 255, 0.46),
                0 0 20px rgba(255, 143, 171, 0.45);
        }

        .tile.special-rainbow::before {
            inset: 8%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.88) 0 28%, rgba(255,255,255,0.18) 48%, transparent 56%);
            animation: rainbow-spin 2.2s linear infinite;
        }

        .tile.special-rainbow::after {
            background:
                radial-gradient(circle at 20% 24%, rgba(255,255,255,0.95) 0 5px, transparent 6px),
                radial-gradient(circle at 78% 28%, rgba(255,255,255,0.82) 0 4px, transparent 5px),
                radial-gradient(circle at 32% 78%, rgba(255,255,255,0.85) 0 5px, transparent 6px),
                radial-gradient(circle at 72% 74%, rgba(255,255,255,0.78) 0 4px, transparent 5px);
            animation: twinkle 1.2s ease-in-out infinite alternate;
        }

        .result-panel {
            margin-top: 14px;
            padding: 14px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.76);
            display: none;
        }

        .result-panel.show {
            display: block;
        }

        .result-score {
            margin: 8px 0 10px;
            font-size: 1.42rem;
            font-weight: 900;
        }

        .burst-text {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            color: white;
            font-weight: 900;
            font-size: clamp(1rem, 4vw, 1.6rem);
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.18);
            opacity: 0;
            white-space: nowrap;
        }

        .burst-text.good {
            color: #ff7b89;
        }

        .burst-text.combo {
            color: #f4b942;
        }

        .spark {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 999px;
            opacity: 0.95;
            animation: spark-fly 0.72s ease-out forwards;
        }

        @keyframes pop-out {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.66); opacity: 0; }
        }

        @keyframes swap-from-left {
            0% { transform: translateX(-20%) scale(0.95); }
            100% { transform: translateX(0) scale(1); }
        }

        @keyframes swap-from-right {
            0% { transform: translateX(20%) scale(0.95); }
            100% { transform: translateX(0) scale(1); }
        }

        @keyframes swap-from-up {
            0% { transform: translateY(-20%) scale(0.95); }
            100% { transform: translateY(0) scale(1); }
        }

        @keyframes swap-from-down {
            0% { transform: translateY(20%) scale(0.95); }
            100% { transform: translateY(0) scale(1); }
        }

        @keyframes special-pulse {
            0% { transform: scale(0.88); }
            60% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }

        @keyframes bomb-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes rainbow-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes twinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        @keyframes invalid-nudge {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8%); }
            50% { transform: translateX(8%); }
            75% { transform: translateX(-6%); }
            100% { transform: translateX(0); }
        }

        @keyframes combo-pop {
            0% { opacity: 0; transform: translateX(-50%) scale(0.7); }
            18% { opacity: 1; transform: translateX(-50%) scale(1.08); }
            70% { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) scale(0.92) translateY(-16px); }
        }

        @keyframes spark-fly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0.3);
                opacity: 0;
            }
        }

        /* === ENHANCED VISUAL EFFECTS === */

        /* Full board flash overlay */
        .flash-overlay { position: absolute; inset: -20px; border-radius: 40px; opacity: 0; pointer-events: none; z-index: 10; }
        .flash-overlay.active { animation: flash-burst 0.5s ease-out forwards; }
        .flash-overlay.white { background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.6) 40%, transparent 70%); }
        .flash-overlay.rainbow { background: conic-gradient(from 0deg, #ff8fab, #ffd166, #8ecae6, #80ed99, #cdb4db, #ff8fab); }
        @keyframes flash-burst { 0% { opacity: 0.95; transform: scale(0.8); } 30% { opacity: 0.7; transform: scale(1.05); } 100% { opacity: 0; transform: scale(1.2); } }

        /* Combo banner - much bigger and more dramatic */
        .combo-banner { position: absolute; left: 50%; top: 20px; transform: translateX(-50%) scale(0); padding: 14px 28px; border-radius: 999px; background: linear-gradient(135deg, #ff8fab, #f4b942); color: white; font-weight: 900; font-size: clamp(1.2rem, 4vw, 1.8rem); text-shadow: 0 3px 12px rgba(0,0,0,0.25), 0 0 30px rgba(255,143,171,0.6); box-shadow: 0 10px 40px rgba(255, 143, 171, 0.5), 0 0 60px rgba(244, 185, 66, 0.4); opacity: 0; z-index: 20; white-space: nowrap; }
        .combo-banner.show { animation: combo-pop 1.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes combo-pop { 0% { opacity: 0; transform: translateX(-50%) scale(0) rotate(-5deg); } 15% { opacity: 1; transform: translateX(-50%) scale(1.3) rotate(3deg); } 25% { transform: translateX(-50%) scale(0.95) rotate(-2deg); } 35% { transform: translateX(-50%) scale(1.08) rotate(1deg); } 50% { opacity: 1; transform: translateX(-50%) scale(1) rotate(0deg); } 80% { opacity: 1; transform: translateX(-50%) scale(1); } 100% { opacity: 0; transform: translateX(-50%) scale(0.8) translateY(-30px); } }

        /* Board shake effect */
        .board-shell.shake { animation: board-shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards; }
        .board-shell.shake-light { animation: board-shake-light 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards; }
        @keyframes board-shake { 0%, 100% { transform: translate(0, 0); } 10% { transform: translate(-8px, -4px) rotate(-1.5deg); } 20% { transform: translate(8px, 4px) rotate(1.5deg); } 30% { transform: translate(-6px, -3px) rotate(-1deg); } 40% { transform: translate(6px, 3px) rotate(1deg); } 50% { transform: translate(-4px, -2px); } 60% { transform: translate(4px, 2px); } 70% { transform: translate(-2px, -1px); } 80% { transform: translate(2px, 1px); } 90% { transform: translate(-1px, 0); } }
        @keyframes board-shake-light { 0%, 100% { transform: translate(0, 0); } 20% { transform: translate(-4px, -2px); } 40% { transform: translate(4px, 2px); } 60% { transform: translate(-3px, -1px); } 80% { transform: translate(3px, 1px); } }

        /* Shockwave ring effect */
        .shockwave { position: absolute; border-radius: 50%; border: 6px solid rgba(255, 200, 100, 0.9); box-shadow: 0 0 20px rgba(255, 180, 50, 0.8), inset 0 0 20px rgba(255, 200, 100, 0.4); pointer-events: none; z-index: 15; }
        .shockwave.active { animation: shockwave-expand 0.6s ease-out forwards; }
        @keyframes shockwave-expand { 0% { width: 20px; height: 20px; opacity: 1; margin-left: -10px; margin-top: -10px; } 100% { width: 300px; height: 300px; opacity: 0; margin-left: -150px; margin-top: -150px; } }

        /* Stripe line sweep effect */
        .stripe-line { position: absolute; pointer-events: none; z-index: 12; border-radius: 8px; }
        .stripe-line.horizontal { left: -10px; right: -10px; height: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), rgba(255,200,100,0.8), rgba(255,255,255,0.95), transparent); box-shadow: 0 0 30px rgba(255,200,100,0.9); }
        .stripe-line.vertical { top: -10px; bottom: -10px; width: 0; background: linear-gradient(180deg, transparent, rgba(255,255,255,0.95), rgba(100,200,255,0.8), rgba(255,255,255,0.95), transparent); box-shadow: 0 0 30px rgba(100,200,255,0.9); }
        .stripe-line.active { animation: stripe-sweep 0.45s ease-out forwards; }
        @keyframes stripe-sweep { 0% { opacity: 1; transform: scaleY(0.5); } 40% { opacity: 1; transform: scaleY(3); } 100% { opacity: 0; transform: scaleY(1); } }

        /* Rainbow wave effect */
        .rainbow-wave { position: absolute; inset: -15px; border-radius: 35px; background: conic-gradient(from 0deg, #ff8fab, #ffd166, #8ecae6, #80ed99, #cdb4db, #ff8fab); opacity: 0; pointer-events: none; z-index: 11; }
        .rainbow-wave.active { animation: rainbow-wave-expand 0.8s ease-out forwards; }
        @keyframes rainbow-wave-expand { 0% { opacity: 0.9; transform: scale(0.5); filter: blur(0); } 50% { opacity: 0.7; filter: blur(2px); } 100% { opacity: 0; transform: scale(1.3); filter: blur(8px); } }

        /* Charge-up animation for special tiles */
        .tile.charging { animation: charge-up 0.5s ease-out forwards; }

    <script>

                    if (n <= 30) return { number: n, boardSize: 6, kindCount: 6, moves: 15 - Math.floor((n - 21) / 5), goals: [22 + Math.floor((n - 21) * 0.8), 10 + Math.floor((n - 21) * 0.5)] };
                    return { number: n, boardSize: 6, kindCount: 6, moves: 13 - Math.floor((n - 31) / 6), goals: [26 + Math.floor((n - 31) * 0.9), 12 + Math.floor((n - 31) * 0.6)] };

        const screens = {
            menu: document.getElementById("menu-screen"),

        const ladderGridEl = document.getElementById("ladder-grid");

        const statusTitleEl = document.getElementById("status-title");
        const statusTextEl = document.getElementById("status-text");
        const boardShellEl = document.getElementById("board-shell");
        const effectLayerEl = document.getElementById("effect-layer");
        const comboBannerEl = document.getElementById("combo-banner");
        const matchBoardEl = document.getElementById("match-board");
        const restartBtn = document.getElementById("restart-btn");
        const backLevelsBtn = document.getElementById("back-levels-btn");
        const resultPanelEl = document.getElementById("result-panel");
        const resultCaptionEl = document.getElementById("result-caption");
        const resultScoreEl = document.getElementById("result-score");
        const resultDetailEl = document.getElementById("result-detail");
        const resultPrimaryBtn = document.getElementById("result-primary-btn");
        const resultSecondaryBtn = document.getElementById("result-secondary-btn");

        let progress = loadProgress();
        let currentLadderId = LADDERS[0].id;
        let currentLevelNumber = 1;
        let currentLevel = null;
        let board = [];
        let boardSize = 5;
        let selectedIndex = null;
        let busy = false;
        let movesLeft = 0;

        let badSwapSet = new Set();

        // ==========================================
        // ENHANCED VISUAL EFFECTS SYSTEM (VFX)
        // ==========================================
        const VFX = {
            // Show full board flash
            flashBoard(type = 'white') {
                const flash = document.createElement('div');
                flash.className = `flash-overlay ${type}`;
                effectLayerEl.appendChild(flash);
                requestAnimationFrame(() => flash.classList.add('active'));
                setTimeout(() => flash.remove(), 600);

            // Screen shake
            shakeBoard(intensity = 'light') {
                boardShellEl.classList.remove('shake', 'shake-light');
                void boardShellEl.offsetWidth;
                boardShellEl.classList.add(intensity === 'heavy' ? 'shake' : 'shake-light');
                setTimeout(() => boardShellEl.classList.remove('shake', 'shake-light'), 600);
            },

            // Show shockwave at position
            showShockwave(x, y) {
                const shockwave = document.createElement('div');
                shockwave.className = 'shockwave';
                shockwave.style.left = x + 'px';
                shockwave.style.top = y + 'px';

                setTimeout(() => shockwave.remove(), 700);
            },

            // Show stripe line sweep (horizontal or vertical)
            showStripeLine(orientation, index, tileSize, gap) {
                const line = document.createElement('div');
                line.className = `stripe-line ${orientation}`;
                if (orientation === 'horizontal') {
                    line.style.top = (index * (tileSize + gap) + tileSize / 2) + 'px';
                } else {
                    line.style.left = (index * (tileSize + gap) + tileSize / 2) + 'px';
                }
                effectLayerEl.appendChild(line);
                requestAnimationFrame(() => line.classList.add('active'));
                setTimeout(() => line.remove(), 500);
            },

            // Show rainbow wave
            showRainbowWave() {
                const wave = document.createElement('div');
                wave.className = 'rainbow-wave';
                effectLayerEl.appendChild(wave);
                requestAnimationFrame(() => wave.classList.add('active'));
                setTimeout(() => wave.remove(), 900);
            },

            // Show chain combo number
            showChainNumber(level) {
                const display = document.createElement('div');
                display.className = 'chain-display';
                display.textContent = level + 'x';
                effectLayerEl.appendChild(display);
                requestAnimationFrame(() => display.classList.add('show'));
                setTimeout(() => display.remove(), 1100);
            },

            // Enhanced spark burst with many particles and varied shapes
            createSparkBurst(indices, color = '#ff8fab', maxCount = 20) {
                const shellRect = boardShellEl.getBoundingClientRect();
                const shapes = ['circle', 'star', 'diamond'];
                indices.slice(0, maxCount).forEach((index, i) => {
                    const tileEl = matchBoardEl.querySelector(`[data-index="${index}"]`);
                    if (!tileEl) return;
                    const rect = tileEl.getBoundingClientRect();

                    const shape = shapes[i % shapes.length];

                    const size = 12 + Math.random() * 16;
                    spark.style.width = size + 'px';
                    spark.style.height = size + 'px';
                    spark.style.left = (rect.left - shellRect.left + rect.width / 2 - size / 2) + 'px';
                    spark.style.top = (rect.top - shellRect.top + rect.height / 2 - size / 2) + 'px';
                    spark.style.background = color;
                    spark.style.setProperty('--dx', ((Math.random() - 0.5) * 140) + 'px');
                    spark.style.setProperty('--dy', ((Math.random() - 0.7) * 130) + 'px');
                    effectLayerEl.appendChild(spark);
                    setTimeout(() => spark.remove(), 900);
                });
            },

            // Show charge-up effect on special tiles
            chargeTiles(indices) {
                indices.forEach(index => {
                    const tileEl = matchBoardEl.querySelector(`[data-index="${index}"]`);

                        tileEl.classList.add('charging');

            // Bomb explosion - shockwave + many sparks
            bombExplosion(centerIndex) {
                const tileEl = matchBoardEl.querySelector(`[data-index="${centerIndex}"]`);
                if (tileEl) {
                    const rect = tileEl.getBoundingClientRect();
                    const shellRect = boardShellEl.getBoundingClientRect();
                    this.showShockwave(
                        rect.left - shellRect.left + rect.width / 2,
                        rect.top - shellRect.top + rect.height / 2
                    );
                    // Extra sparks for bomb
                    this.createSparkBurst([centerIndex], '#ffd700', 30);
                }
                this.shakeBoard('heavy');
            },

            // Stripe activation - line sweep effect
            activateStripe(type, lineIndex) {
                const matchBoard = document.querySelector('.match-board');
                const tileSize = matchBoard.querySelector('.tile')?.offsetWidth || 60;
                const gap = 8;
                this.showStripeLine(type === 'row' ? 'horizontal' : 'vertical', lineIndex, tileSize, gap);
                this.createSparkBurst([lineIndex], type === 'row' ? '#ffcc66' : '#66ccff', 16);
            },

            // Rainbow activation - wave effect
            activateRainbow() {
                this.showRainbowWave();
                this.flashBoard('rainbow');
                this.shakeBoard('heavy');
                // Rainbow creates sparks across entire board
                const allIndices = Array.from({length: boardSize * boardSize}, (_, i) => i);
                this.createSparkBurst(allIndices, '#ffd700', 40);
            }
        };

        // Enhanced AudioEngine with more impactful sounds
        const AudioEngine = (() => {
            let ctx = null;
            function ensure() {
                if (!ctx) {
                    const Ctor = window.AudioContext || window.webkitAudioContext;
                    if (!Ctor) return null;
                    ctx = new Ctor();
                }
                if (ctx.state === "suspended") ctx.resume().catch(() => {});
                return ctx;
            }
            function tone(freq, duration, type, volume) {
                const audio = ensure();
                if (!audio) return;
                const osc = audio.createOscillator();
                const gain = audio.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.value = volume;
                gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + duration);
                osc.connect(gain);
                gain.connect(audio.destination);
                osc.start();
                osc.stop(audio.currentTime + duration);
            }
            // Play multiple harmonics for richer sound
            function chord(freqs, duration, volume) {
                freqs.forEach(f => tone(f, duration, 'sine', volume / freqs.length));
            }
            return {
                select() { tone(520, 0.07, "triangle", 0.04); },
                swap() { tone(640, 0.08, "square", 0.05); },
                clear(power = 1) {
                    // More impactful clear sound
                    tone(520 + power * 45, 0.12, "triangle", 0.07);
                    window.setTimeout(() => tone(690 + power * 40, 0.15, "triangle", 0.07), 60);
                    window.setTimeout(() => tone(860 + power * 30, 0.18, "sine", 0.05), 120);
                },
                combo(level) {
                    // Dramatic combo sound with harmonics
                    const baseFreq = 600 + level * 80;
                    chord([baseFreq, baseFreq * 1.5, baseFreq * 2], 0.15, 0.08);
                    window.setTimeout(() => chord([baseFreq * 1.2, baseFreq * 1.8], 0.2, 0.07), 100);
                    window.setTimeout(() => tone(baseFreq * 2.5, 0.3, "triangle", 0.06), 200);
                },
                fail() {
                    tone(220, 0.15, "sawtooth", 0.06);
                    window.setTimeout(() => tone(160, 0.2, "sawtooth", 0.06), 80);
                },
                explosion() {
                    // Bomb/explosion sound
                    tone(150, 0.1, "sawtooth", 0.1);
                    tone(100, 0.2, "square", 0.08);
                    window.setTimeout(() => tone(80, 0.3, "sawtooth", 0.06), 50);
                },
                stripe() {
                    // Stripe sweep sound
                    tone(800, 0.08, "square", 0.06);
                    tone(1000, 0.1, "square", 0.05);
                    tone(1200, 0.12, "triangle", 0.04);
                },
                rainbow() {
                    // Rainbow super effect sound
                    chord([523, 659, 784, 1047], 0.2, 0.06);
                    window.setTimeout(() => chord([587, 740, 880, 1175], 0.25, 0.06), 150);
                    window.setTimeout(() => chord([659, 784, 988, 1319], 0.3, 0.07), 300);
                }
            };
        })();

        function loadProgress() {
            const state = { ladders: {} };
            LADDERS.forEach((ladder) => {
                state.ladders[ladder.id] = { unlocked: 1, solved: {} };
            });
            try {
                const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
                if (!raw || !raw.ladders) return state;
                LADDERS.forEach((ladder) => {
                    const saved = raw.ladders[ladder.id] || {};
                    state.ladders[ladder.id] = {
                        unlocked: Math.max(1, Math.min(ladder.levels.length, Number(saved.unlocked) || 1)),
                        solved: typeof saved.solved === "object" && saved.solved ? saved.solved : {}
                    };
                });
            } catch (error) {
                return state;
            }
            return state;
        }

        function saveProgress() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            } catch (error) {}
        }

        function setScreen(name) {
            Object.entries(screens).forEach(([key, el]) => {
                el.classList.toggle("active", key === name);
            });
        }

        function getLadder(id) {
            return LADDERS.find((ladder) => ladder.id === id);
        }

        function getLadderProgress(id) {
            return progress.ladders[id];
        }

        function getSolvedCount(id) {
            return Object.keys(getLadderProgress(id).solved).length;
        }

        function getStarCount(id) {
            return Object.values(getLadderProgress(id).solved).reduce((sum, item) => sum + (item.stars || 0), 0);
        }

        function getNextLevelNumber(id) {
            return Math.min(getLadder(id).levels.length, getLadderProgress(id).unlocked);
        }

        function setStatus(title, text) {
            statusTitleEl.textContent = title;
            statusTextEl.textContent = text;
        }

        function hideResult() {
            resultPanelEl.classList.remove("show");
        }

        function showResult(options) {
            resultCaptionEl.textContent = options.caption;
            resultScoreEl.textContent = options.score;
            resultDetailEl.textContent = options.detail;
            resultPrimaryBtn.textContent = options.primaryLabel;
            resultSecondaryBtn.textContent = options.secondaryLabel;
            resultPrimaryBtn.onclick = options.primaryAction;
            resultSecondaryBtn.onclick = options.secondaryAction;
            resultPanelEl.classList.add("show");
        }

        function renderMenu(shouldSwitch = true) {
            const totalLevels = LADDERS.reduce((sum, ladder) => sum + ladder.levels.length, 0);
            const done = LADDERS.reduce((sum, ladder) => sum + getSolvedCount(ladder.id), 0);
            globalProgressEl.textContent = `已完成 ${done} / ${totalLevels} 关`;
            ladderGridEl.innerHTML = "";
            LADDERS.forEach((ladder) => {
                const solved = getSolvedCount(ladder.id);
                const stars = getStarCount(ladder.id);
                const nextLevel = getNextLevelNumber(ladder.id);
                const card = document.createElement("button");
                card.type = "button";
                card.className = "ladder-card";
                card.style.borderColor = `${ladder.accent}66`;
                card.innerHTML = `
                    <div class="pill" style="color:${ladder.accent};">${ladder.title}</div>
                    <h3>${ladder.shortTitle}</h3>
                    <div class="muted" style="margin-top:8px;line-height:1.55;">${ladder.description}</div>
                    <div class="meta">
                        <div>已通关：${solved} / ${ladder.levels.length}</div>
                        <div>累计星星：${stars} ✨</div>
                        <div>继续建议：第 ${nextLevel} 关</div>
                    </div>
                `;
                card.addEventListener("click", () => {
                    currentLadderId = ladder.id;
                    renderLevels();
                });
                ladderGridEl.appendChild(card);
            });
            if (shouldSwitch) setScreen("menu");
        }

        function renderLevels() {
            const ladder = getLadder(currentLadderId);
            const solved = getSolvedCount(currentLadderId);
            const nextLevel = getNextLevelNumber(currentLadderId);
            levelsTitleEl.textContent = ladder.title;
            levelsDescEl.textContent = ladder.description;
            summaryClearedEl.textContent = `${solved} / ${ladder.levels.length}`;
            summaryNextEl.textContent = `第 ${nextLevel} 关`;
            summaryStarsEl.textContent = `${getStarCount(currentLadderId)} ✨`;
            progressFillEl.style.width = `${(solved / ladder.levels.length) * 100}%`;
            levelsGridEl.innerHTML = "";

            ladder.levels.forEach((level) => {
                const record = getLadderProgress(currentLadderId).solved[level.number];
                const unlocked = level.number <= getLadderProgress(currentLadderId).unlocked || Boolean(record);
                const button = document.createElement("button");
                button.type = "button";
                button.className = "level-pill";
                if (!unlocked) button.classList.add("locked");
                if (record) button.classList.add("done");
                if (level.number === nextLevel) button.classList.add("current");
                button.innerHTML = `${level.number}${record ? `<span class="badge">${"✨".repeat(record.stars || 1)}</span>` : ""}`;
                if (unlocked) {
                    button.addEventListener("click", () => startLevel(currentLadderId, level.number));
                } else {
                    button.disabled = true;
                }
                levelsGridEl.appendChild(button);
            });

            continueBtn.textContent = solved >= ladder.levels.length ? "重玩第 40 关" : `继续第 ${nextLevel} 关`;
            continueBtn.onclick = () => startLevel(currentLadderId, solved >= ladder.levels.length ? ladder.levels.length : nextLevel);
            setScreen("levels");
        }

        function pickGoalKinds(pool, count, seed) {
            const result = [];
            for (let i = 0; i < count; i += 1) {
                result.push(pool[(seed + i * 2) % pool.length]);
            }
            return result;
        }

        function startLevel(ladderId, levelNumber) {
            currentLadderId = ladderId;
            currentLevelNumber = levelNumber;
            currentLevel = getLadder(ladderId).levels[levelNumber - 1];
            boardSize = currentLevel.boardSize;
            selectedIndex = null;
            busy = false;
            score = 0;
            movesLeft = currentLevel.moves;
            clearingSet = new Set();
            specialFlashSet = new Set();
            swapAnimations = new Map();
            badSwapSet = new Set();
            dragState = null;
            tileId = 1;
            hideResult();

            const ladder = getLadder(ladderId);
            const goalKinds = pickGoalKinds(ladder.pool, currentLevel.goals.length, levelNumber + ladder.pool.length);
            goalsState = currentLevel.goals.map((target, index) => ({
                kind: goalKinds[index],
                target,
                collected: 0
            }));

            board = createPlayableBoard(boardSize, ladder.pool.slice(0, currentLevel.kindCount));
            renderGame();
            setStatus("开始闯关", "做四个会得到横扫或竖扫，做五个或者十字形会得到炸弹。");
            setScreen("game");
        }

        function createPlayableBoard(size, pool) {
            let attempt = 0;
            while (attempt < 80) {
                const nextBoard = new Array(size * size).fill(null);
                for (let y = 0; y < size; y += 1) {
                    for (let x = 0; x < size; x += 1) {
                        const forbidden = new Set();
                        if (x >= 2) {
                            const left1 = nextBoard[indexOf(x - 1, y, size)];
                            const left2 = nextBoard[indexOf(x - 2, y, size)];
                            if (left1 && left2 && left1.kind === left2.kind) forbidden.add(left1.kind);
                        }
                        if (y >= 2) {
                            const up1 = nextBoard[indexOf(x, y - 1, size)];
                            const up2 = nextBoard[indexOf(x, y - 2, size)];
                            if (up1 && up2 && up1.kind === up2.kind) forbidden.add(up1.kind);
                        }
                        const choices = pool.filter((kind) => !forbidden.has(kind));
                        const kind = choices[Math.floor(Math.random() * choices.length)];
                        nextBoard[indexOf(x, y, size)] = makeTile(kind);
                    }
                }
                if (hasPossibleMove(nextBoard, size)) return nextBoard;
                attempt += 1;
            }
            return new Array(size * size).fill(null).map(() => makeTile(pool[Math.floor(Math.random() * pool.length)]));
        }

        function makeTile(kind, special = null) {
            return {
                id: tileId++,
                kind,
                special
            };
        }

        function getSpecialPriority(special) {
            if (special === "bomb") return 4;
            if (special === "rainbow") return 3;
            if (special === "row" || special === "col") return 2;
            return 0;
        }

        function indexOf(x, y, size = boardSize) {
            return y * size + x;
        }

        function coords(index, size = boardSize) {
            return { x: index % size, y: Math.floor(index / size) };
        }

        function areAdjacent(a, b) {
            const p1 = coords(a);
            const p2 = coords(b);
            return Math.abs(p1.x - p2.x) + Math.abs(p1.y - p2.y) === 1;
        }

        function swapTiles(source, a, b) {
            const temp = source[a];
            source[a] = source[b];
            source[b] = temp;
        }

        function renderGame() {
            const ladder = getLadder(currentLadderId);
            matchBoardEl.style.setProperty("--grid-size", String(boardSize));
            hudLadderEl.textContent = ladder.shortTitle;
            hudLevelEl.textContent = `${currentLevelNumber} / ${ladder.levels.length}`;
            hudMovesEl.textContent = String(movesLeft);
            hudScoreEl.textContent = String(score);

            goalListEl.innerHTML = "";
            goalsState.forEach((goal) => {
                const chip = document.createElement("div");
                chip.className = "goal-chip";
                if (goal.collected >= goal.target) chip.classList.add("done");
                chip.textContent = `${goal.kind} ${Math.min(goal.collected, goal.target)} / ${goal.target}`;
                goalListEl.appendChild(chip);
            });

            matchBoardEl.innerHTML = "";
            board.forEach((tile, index) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "tile";
                button.dataset.index = String(index);
                if (selectedIndex === index) button.classList.add("selected");
                if (dragState && dragState.index === index) button.classList.add("drag-source");
                if (clearingSet.has(index)) button.classList.add("clearing");
                if (specialFlashSet.has(index)) button.classList.add("special-fire");
                if (badSwapSet.has(index)) button.classList.add("bad-swap");
                if (!tile) button.classList.add("empty");
                if (tile && tile.special) button.classList.add(`special-${tile.special}`);
                const swapClass = swapAnimations.get(index);
                if (swapClass) button.classList.add(swapClass);
                button.innerHTML = tile ? `<span class="emoji">${tile.kind}</span>` : "";
                matchBoardEl.appendChild(button);
            });
        }

        function showComboBanner(text) {
            comboBannerEl.textContent = text;
            comboBannerEl.classList.remove("show");
            void comboBannerEl.offsetWidth;
            comboBannerEl.classList.add("show");
        }

        function showBurstText(text, kind = "good") {
            const el = document.createElement("div");
            el.className = `burst-text ${kind}`;
            el.textContent = text;
            effectLayerEl.appendChild(el);
            requestAnimationFrame(() => el.classList.add("show"));
            window.setTimeout(() => el.remove(), 1000);
        }

        function createSparkBurst(indices, color = "#ff8fab", maxCount = 20) {
            // Use enhanced VFX system (20 particles default, up from 8)
            VFX.createSparkBurst(indices, color, maxCount);
        }

        function setSwapAnimationPair(a, b) {
            const start = coords(a);
            const end = coords(b);
            const dx = end.x - start.x;
            const dy = end.y - start.y;
            swapAnimations = new Map();
            if (dx === 1) {
                swapAnimations.set(a, "from-right");
                swapAnimations.set(b, "from-left");
            } else if (dx === -1) {
                swapAnimations.set(a, "from-left");
                swapAnimations.set(b, "from-right");
            } else if (dy === 1) {
                swapAnimations.set(a, "from-down");
                swapAnimations.set(b, "from-up");
            } else if (dy === -1) {
                swapAnimations.set(a, "from-up");
                swapAnimations.set(b, "from-down");
            }
            window.setTimeout(() => {
                swapAnimations = new Map();
                renderGame();
            }, 240);
        }

        function handleTileTap(index) {
            if (busy) return;
            const tile = board[index];
            if (!tile) return;

            if (selectedIndex === null) {
                selectedIndex = index;
                AudioEngine.select();
                renderGame();
                return;
            }

            if (selectedIndex === index) {
                selectedIndex = null;
                renderGame();
                return;
            }

            if (!areAdjacent(selectedIndex, index)) {
                selectedIndex = index;
                renderGame();
                return;
            }

            const from = selectedIndex;
            selectedIndex = null;
            attemptSwap(from, index);
        }

        function tileFromEvent(event) {
            const tileEl = event.target.closest(".tile");
            if (!tileEl || !matchBoardEl.contains(tileEl)) return null;
            const index = Number(tileEl.dataset.index);
            return Number.isFinite(index) ? index : null;
        }

        function getDragTarget(index, dx, dy) {
            const point = coords(index);
            if (Math.abs(dx) >= Math.abs(dy)) {
                if (Math.abs(dx) < 18) return null;
                const nextX = point.x + (dx > 0 ? 1 : -1);
                if (nextX < 0 || nextX >= boardSize) return null;
                return indexOf(nextX, point.y);
            }
            if (Math.abs(dy) < 18) return null;
            const nextY = point.y + (dy > 0 ? 1 : -1);
            if (nextY < 0 || nextY >= boardSize) return null;
            return indexOf(point.x, nextY);
        }

        function onBoardPointerDown(event) {
            if (busy) return;
            const index = tileFromEvent(event);
            if (index === null || !board[index]) return;
            event.preventDefault();
            dragState = {
                pointerId: event.pointerId,
                index,
                startX: event.clientX,
                startY: event.clientY,
                moved: false
            };
            renderGame();
        }

        function onBoardPointerMove(event) {
            if (!dragState || dragState.pointerId !== event.pointerId || busy) return;
            const target = getDragTarget(dragState.index, event.clientX - dragState.startX, event.clientY - dragState.startY);
            if (target === null || !board[target]) return;
            dragState.moved = true;
            const from = dragState.index;
            dragState = null;
            selectedIndex = null;
            attemptSwap(from, target, { fromDrag: true });
        }

        function onBoardPointerUp(event) {
            if (!dragState || dragState.pointerId !== event.pointerId) return;
            const index = dragState.index;
            const moved = dragState.moved;
            dragState = null;
            if (!moved) handleTileTap(index);
            else renderGame();
        }

        async function attemptSwap(a, b, options = {}) {
            if (busy) return;
            busy = true;
            swapTiles(board, a, b);
            setSwapAnimationPair(a, b);
            AudioEngine.swap();
            renderGame();

            if ((board[a] && board[a].special === "rainbow") || (board[b] && board[b].special === "rainbow")) {
                movesLeft -= 1;
                const rainbow = buildRainbowSwapSet(a, b);
                setStatus("超级棋子出动", "它会把全盘同类棋子一下子全部清掉。");
                showComboBanner("超级清屏!");
                showBurstText("超级棋子!", "combo");
                await applyClearSet(rainbow.clearSet, new Map(), {
                    comboLevel: 2,
                    source: "rainbow",
                    flashColor: rainbow.color,
                    burstText: rainbow.label
                });
                await resolveCascades();
                finishTurn();
                return;
            }

            if ((board[a] && board[a].special) || (board[b] && board[b].special)) {
                movesLeft -= 1;
                setStatus("特殊块出动", "看它们怎么把整行、整列或者一片区域清掉。");
                showBurstText("特殊块!", "combo");
                let clearSet = new Set([a, b]);
                expandSpecials(clearSet);
                await applyClearSet(clearSet, new Map(), { comboLevel: 1, source: "special" });
                await resolveCascades();
                finishTurn();
                return;
            }

            const groups = findMatches(board, boardSize);
            if (!groups.length) {
                await wait(240);
                swapTiles(board, a, b);
                setSwapAnimationPair(b, a);
                badSwapSet = new Set([a, b]);
                renderGame();
                setStatus("这步不行", "换成旁边另一个表情试试。");
                showBurstText(options.fromDrag ? "滑错啦" : "再试试", "good");
                AudioEngine.fail();
                window.setTimeout(() => {
                    badSwapSet = new Set();
                    renderGame();
                }, 360);
                busy = false;
                return;
            }

            movesLeft -= 1;
            setStatus("消掉啦", "继续找机会做四消和五消。");
            await applyMatchGroups(groups, [a, b], 1);
            await resolveCascades();
            finishTurn();
        }

        function findMatches(source, size) {
            const groups = [];

            for (let y = 0; y < size; y += 1) {
                let x = 0;
                while (x < size) {
                    const start = indexOf(x, y, size);
                    const tile = source[start];
                    if (!tile) {
                        x += 1;
                        continue;
                    }
                    let end = x + 1;
                    while (end < size) {
                        const other = source[indexOf(end, y, size)];
                        if (!other || other.kind !== tile.kind) break;
                        end += 1;
                    }
                    if (end - x >= 3) {
                        groups.push({
                            kind: tile.kind,
                            orientation: "row",
                            indices: Array.from({ length: end - x }, (_, offset) => indexOf(x + offset, y, size))
                        });
                    }
                    x = end;
                }
            }

            for (let x = 0; x < size; x += 1) {
                let y = 0;
                while (y < size) {
                    const start = indexOf(x, y, size);
                    const tile = source[start];
                    if (!tile) {
                        y += 1;
                        continue;
                    }
                    let end = y + 1;
                    while (end < size) {
                        const other = source[indexOf(x, end, size)];
                        if (!other || other.kind !== tile.kind) break;
                        end += 1;
                    }
                    if (end - y >= 3) {
                        groups.push({
                            kind: tile.kind,
                            orientation: "col",
                            indices: Array.from({ length: end - y }, (_, offset) => indexOf(x, y + offset, size))
                        });
                    }
                    y = end;
                }
            }

            return groups;
        }

        function preferredCreateIndex(group, movedIndices) {
            for (const index of movedIndices) {
                if (group.indices.includes(index)) return index;
            }
            return group.indices[Math.floor(group.indices.length / 2)];
        }

        function buildCreationMap(groups, movedIndices) {
            const createMap = new Map();
            const overlap = new Map();
            groups.forEach((group) => {
                group.indices.forEach((index) => {
                    overlap.set(index, (overlap.get(index) || 0) + 1);
                });
            });

            overlap.forEach((count, index) => {
                if (count > 1) {
                    const tile = board[index];
                    if (tile) createMap.set(index, { kind: tile.kind, special: "bomb" });
                }
            });

            groups.forEach((group) => {
                if (group.indices.length < 4) return;
                const index = preferredCreateIndex(group, movedIndices);
                const tile = board[index];
                if (!tile) return;
                const special = group.indices.length >= 5 ? "rainbow" : group.orientation === "row" ? "row" : "col";
                const existing = createMap.get(index);
                if (!existing || getSpecialPriority(special) > getSpecialPriority(existing.special)) {
                    createMap.set(index, { kind: tile.kind, special });
                }
            });

            return createMap;
        }

        function expandSpecials(clearSet) {
            const queue = [...clearSet];
            const seen = new Set();
            while (queue.length) {
                const index = queue.shift();
                if (seen.has(index)) continue;
                seen.add(index);
                const tile = board[index];
                if (!tile || !tile.special) continue;
                getBlastIndices(index, tile.special).forEach((target) => {
                    if (!clearSet.has(target)) {
                        clearSet.add(target);
                        queue.push(target);
                    }
                });
            }
        }

        function getBlastIndices(index, special) {
            const { x, y } = coords(index);
            const indices = [];
            if (special === "row") {
                for (let cx = 0; cx < boardSize; cx += 1) indices.push(indexOf(cx, y));
            } else if (special === "col") {
                for (let cy = 0; cy < boardSize; cy += 1) indices.push(indexOf(x, cy));
            } else if (special === "bomb") {
                for (let dy = -1; dy <= 1; dy += 1) {
                    for (let dx = -1; dx <= 1; dx += 1) {
                        const nx = x + dx;
                        const ny = y + dy;
                        if (nx >= 0 && nx < boardSize && ny >= 0 && ny < boardSize) {
                            indices.push(indexOf(nx, ny));
                        }
                    }
                }
            } else if (special === "rainbow") {
                const tile = board[index];
                if (!tile) return indices;
                for (let target = 0; target < board.length; target += 1) {
                    const current = board[target];
                    if (current && current.kind === tile.kind) indices.push(target);
                }
            }
            return indices;
        }

        function buildRainbowSwapSet(a, b) {
            const tileA = board[a];
            const tileB = board[b];
            const clearSet = new Set([a, b]);
            if (tileA && tileB && tileA.special === "rainbow" && tileB.special === "rainbow") {
                for (let index = 0; index < board.length; index += 1) {
                    if (board[index]) clearSet.add(index);
                }
                return { clearSet, label: "双超级清屏!", color: "#ffd166" };
            }

            const rainbowIndex = tileA && tileA.special === "rainbow" ? a : b;
            const targetTile = rainbowIndex === a ? tileB : tileA;
            const targetKind = targetTile ? targetTile.kind : null;
            if (!targetKind) {
                return { clearSet, label: "超级清屏!", color: "#ffd166" };
            }

            for (let index = 0; index < board.length; index += 1) {
                const current = board[index];
                if (current && current.kind === targetKind) clearSet.add(index);
            }
            return { clearSet, label: `${targetKind} 全盘消除!`, color: "#ffd166" };
        }

        async function applyMatchGroups(groups, movedIndices, comboLevel = 1) {
            const clearSet = new Set();
            groups.forEach((group) => group.indices.forEach((index) => clearSet.add(index)));
            const createMap = buildCreationMap(groups, movedIndices);
            expandSpecials(clearSet);
            createMap.forEach((_, index) => clearSet.delete(index));
            await applyClearSet(clearSet, createMap, { comboLevel, source: "match" });
        }

        async function applyClearSet(clearSet, createMap, meta = {}) {
            const comboLevel = meta.comboLevel || 1;
            specialFlashSet = new Set(createMap.keys());
            clearingSet = new Set(clearSet);
            renderGame();

            // Enhanced VFX: charge-up special tiles before explosion
            if (createMap.size > 0) {
                VFX.chargeTiles([...createMap.keys()]);
            }

            // Detect and trigger special tile VFX
            let hasBomb = false;
            let hasStripe = false;
            let stripeType = null;
            let stripeIndex = -1;
            let hasRainbow = meta.source === 'rainbow';

            // Check clearSet for bomb and stripe activations
            clearSet.forEach(index => {
                const tile = board[index];
                if (tile && tile.special) {
                    if (tile.special === 'bomb' && !hasBomb) {
                        hasBomb = true;
                        VFX.bombExplosion(index);
                        AudioEngine.explosion();
                    }
                    if ((tile.special === 'row' || tile.special === 'col') && !hasStripe) {
                        hasStripe = true;
                        stripeType = tile.special;
                        const c = coords(index);
                        stripeIndex = tile.special === 'row' ? c.y : c.x;
                        AudioEngine.stripe();
                    }
                }
            });

            // Trigger rainbow wave
            if (hasRainbow) {
                VFX.activateRainbow();
                AudioEngine.rainbow();
            }

            // Trigger stripe line sweep
            if (hasStripe) {
                VFX.activateStripe(stripeType, stripeIndex);
            }

            // Enhanced spark bursts
            createSparkBurst(
                [...clearSet],
                meta.flashColor || (createMap.size ? "#f4b942" : "#ff8fab"),
                meta.source === "rainbow" ? 40 : 20
            );

            // Chain combo effects
            if (comboLevel > 1) {
                VFX.flashBoard('white');
                VFX.shakeBoard(comboLevel >= 3 ? 'heavy' : 'light');
                VFX.showChainNumber(comboLevel);
                if (meta.source !== 'rainbow') {
                    showComboBanner(`连锁 x${comboLevel}`);
                    AudioEngine.combo(comboLevel);
                } else {
                    AudioEngine.combo(comboLevel + 1);
                }
            } else {
                AudioEngine.clear(createMap.size + clearSet.size / 4);
            }

            if (meta.burstText) {
                showBurstText(meta.burstText, "combo");
            } else if (createMap.size) {
                const specials = [...createMap.values()].map((item) => item.special);
                if (specials.includes("rainbow")) {
                    showComboBanner("超级棋子诞生!");
                    showBurstText("五消! 超级棋子!", "combo");
                } else if (specials.includes("bomb")) {
                    showBurstText("炸弹诞生!", "combo");
                } else {
                    showBurstText(createMap.size > 1 ? "超强合成!" : "做出特殊块!", "combo");
                }
            } else if (clearSet.size >= 6) {
                showBurstText("太棒啦!", "good");
            }
            await wait(320);
            collectRewards(clearSet);
            clearSet.forEach((index) => {
                board[index] = null;
            });
            createMap.forEach((data, index) => {
                board[index] = makeTile(data.kind, data.special);
                score += data.special === "bomb" ? 120 : 80;
            });
            collapseBoard();
            refillBoard();
            clearingSet = new Set();
            specialFlashSet = new Set();
            renderGame();
            await wait(240);
        }

        function collectRewards(clearSet) {
            clearSet.forEach((index) => {
                const tile = board[index];
                if (!tile) return;
                score += tile.special ? 70 : 35;
                goalsState.forEach((goal) => {
                    if (goal.kind === tile.kind && goal.collected < goal.target) {
                        goal.collected += 1;
                    }
                });
            });
        }

        function collapseBoard() {
            for (let x = 0; x < boardSize; x += 1) {
                const column = [];
                for (let y = boardSize - 1; y >= 0; y -= 1) {
                    const tile = board[indexOf(x, y)];
                    if (tile) column.push(tile);
                }
                for (let y = boardSize - 1; y >= 0; y -= 1) {
                    board[indexOf(x, y)] = column[boardSize - 1 - y] || null;
                }
            }
        }

        function refillBoard() {
            const pool = getLadder(currentLadderId).pool.slice(0, currentLevel.kindCount);
            for (let index = 0; index < board.length; index += 1) {
                if (!board[index]) {
                    board[index] = makeTile(pool[Math.floor(Math.random() * pool.length)]);
                }
            }
        }

        async function resolveCascades() {
            let comboLevel = 1;
            while (true) {
                const groups = findMatches(board, boardSize);
                if (!groups.length) break;
                comboLevel += 1;
                setStatus("连锁继续", "哇，新的连锁又自己消掉啦。");
                await applyMatchGroups(groups, [], comboLevel);
            }
        }

        function goalsCompleted() {
            return goalsState.every((goal) => goal.collected >= goal.target);
        }

        function finishTurn() {
            if (!hasPossibleMove(board, boardSize)) {
                reshuffleBoard();
                setStatus("重新排队", "没有可消的组合了，星星把棋盘重新排好了。");
            }
            renderGame();
            if (goalsCompleted()) {
                finishWin();
                return;
            }
            if (movesLeft <= 0) {
                finishFail();
                return;
            }
            setStatus("继续加油", "优先做四消和五消，会更容易完成目标。");
            busy = false;
        }

        function finishWin() {
            busy = false;
            const ladder = getLadder(currentLadderId);
            const ladderProgress = getLadderProgress(currentLadderId);
            const stars = movesLeft >= Math.ceil(currentLevel.moves * 0.35) ? 3 : movesLeft >= Math.ceil(currentLevel.moves * 0.15) ? 2 : 1;
            const previous = ladderProgress.solved[currentLevelNumber];
            ladderProgress.solved[currentLevelNumber] = {
                stars: Math.max(stars, previous ? previous.stars || 0 : 0),
                bestScore: Math.max(score, previous ? previous.bestScore || 0 : 0)
            };
            ladderProgress.unlocked = Math.min(ladder.levels.length, Math.max(ladderProgress.unlocked, currentLevelNumber + 1));
            saveProgress();
            renderMenu(false);
            setStatus("通关成功", "这一关已经记住了，下次可以从已解锁关卡继续。");
            showResult({
                caption: "闯关成功",
                score: `${score} 分  ·  ${"✨".repeat(stars)}`,
                detail: currentLevelNumber >= ladder.levels.length
                    ? "这一整个阶梯都打通了，可以回去重玩高分，或者试试更难的阶梯。"
                    : `已解锁第 ${Math.min(ladder.levels.length, currentLevelNumber + 1)} 关。`,
                primaryLabel: currentLevelNumber >= ladder.levels.length ? "回到选关" : "下一关",
                primaryAction: () => currentLevelNumber >= ladder.levels.length ? renderLevels() : startLevel(currentLadderId, currentLevelNumber + 1),
                secondaryLabel: "回到选关",
                secondaryAction: () => renderLevels()
            });
        }

        function finishFail() {
            busy = false;
            setStatus("步数用完了", "下一次优先做特殊块，清目标会更快。");
            showResult({
                caption: "本关未通过",
                score: `${score} 分`,
                detail: "已完成的关卡不会丢失，可以随时回来重玩拿更高分。",
                primaryLabel: "重玩本关",
                primaryAction: () => startLevel(currentLadderId, currentLevelNumber),
                secondaryLabel: "回到选关",
                secondaryAction: () => renderLevels()
            });
        }

        function hasPossibleMove(source, size) {
            for (let index = 0; index < source.length; index += 1) {
                const tile = source[index];
                if (!tile) continue;
                const { x, y } = coords(index, size);
                const right = x + 1 < size ? indexOf(x + 1, y, size) : -1;
                const down = y + 1 < size ? indexOf(x, y + 1, size) : -1;
                for (const next of [right, down]) {
                    if (next === -1 || !source[next]) continue;
                    if (tile.special || source[next].special) return true;
                    swapTiles(source, index, next);
                    const matchFound = findMatches(source, size).length > 0;
                    swapTiles(source, index, next);
                    if (matchFound) return true;
                }
            }
            return false;
        }

        function reshuffleBoard() {
            const pool = getLadder(currentLadderId).pool.slice(0, currentLevel.kindCount);
            board = createPlayableBoard(boardSize, pool);
        }

        function wait(ms) {
            return new Promise((resolve) => window.setTimeout(resolve, ms));
        }

        backMenuBtn.addEventListener("click", renderMenu);
        backLevelsBtn.addEventListener("click", renderLevels);
        restartBtn.addEventListener("click", () => startLevel(currentLadderId, currentLevelNumber));
        matchBoardEl.addEventListener("pointerdown", onBoardPointerDown);
        window.addEventListener("pointermove", onBoardPointerMove);
        window.addEventListener("pointerup", onBoardPointerUp);
        window.addEventListener("pointercancel", onBoardPointerUp);

        renderMenu();
    </script>
</body>
</html>
