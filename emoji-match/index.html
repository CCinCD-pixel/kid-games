<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>表情消消乐</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-touch-fullscreen" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
  </head>
  <body>
    <a href="../index.html" class="back-home">🏠 返回</a>

    <div class="app">
      <div class="hero">
        <h1>🍓 表情消消乐</h1>
        <p>
          给 5 岁半小朋友做的轻策略版。支持四消做横扫/竖扫，五消或十字形做炸弹，每个阶梯同样有
          40 关和本地进度记录。
        </p>
      </div>

      <section class="screen active" id="menu-screen">
        <div class="panel">
          <div class="top-row">
            <div>
              <h2 class="section-title">选择冒险阶梯</h2>
              <div class="muted">后面的阶梯会用更多表情、更多目标和更紧的步数。</div>
            </div>
            <div class="pill" id="global-progress">已完成 0 / 120 关</div>
          </div>
          <div class="ladder-grid" id="ladder-grid"></div>
        </div>
      </section>

      <section class="screen" id="levels-screen">
        <div class="panel">
          <div class="top-row">
            <div>
              <h2 class="section-title" id="levels-title"></h2>
              <div class="muted" id="levels-desc"></div>
            </div>
            <div class="button-row">
              <button class="ghost-btn" id="back-menu-btn">返回阶梯</button>
              <button class="primary-btn" id="continue-btn">继续挑战</button>
            </div>
          </div>

          <div class="summary-grid">
            <div class="summary-card">
              已完成
              <strong id="summary-cleared">0 / 40</strong>
            </div>
            <div class="summary-card">
              下一关
              <strong id="summary-next">第 1 关</strong>
            </div>
            <div class="summary-card">
              累计星星
              <strong id="summary-stars">0 ✨</strong>
            </div>
          </div>

          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>

          <div class="levels-grid" id="levels-grid"></div>
        </div>
      </section>

      <section class="screen" id="game-screen">
        <div class="panel">
          <div class="hud">
            <div class="button-row">
              <div class="hud-chip">
                <span>阶梯</span>
                <strong id="hud-ladder">水果</strong>
              </div>
              <div class="hud-chip">
                <span>关卡</span>
                <strong id="hud-level">1 / 40</strong>
              </div>
              <div class="hud-chip">
                <span>步数</span>
                <strong id="hud-moves">18</strong>
              </div>
              <div class="hud-chip">
                <span>分数</span>
                <strong id="hud-score">0</strong>
              </div>
            </div>
            <div class="button-row">
              <button class="mini-btn" id="restart-btn">重玩本关</button>
              <button class="ghost-btn" id="back-levels-btn">回到选关</button>
            </div>
          </div>

          <div class="goal-zone">
            <div class="goal-list" id="goal-list"></div>
          </div>

          <div class="status-box">
            <div class="status-title" id="status-title">准备开始</div>
            <div class="status-text" id="status-text">
              点一个表情，或者直接朝旁边拖一下交换。三个连在一起就会消掉。
            </div>
          </div>

          <div class="legend">
            <div class="legend-chip">🍬 四消条纹棋子</div>
            <div class="legend-chip">💣 十字炸弹</div>
            <div class="legend-chip">🌈 五消超级棋子</div>
          </div>

          <div class="board-shell" id="board-shell">
            <div class="effect-layer" id="effect-layer">
              <div class="combo-banner" id="combo-banner"></div>
            </div>
            <div class="match-board" id="match-board"></div>
          </div>

          <div class="result-panel" id="result-panel">
            <div class="muted" id="result-caption">本关结果</div>
            <div class="result-score" id="result-score">0 分</div>
            <div class="muted" id="result-detail"></div>
            <div class="result-actions">
              <button class="ghost-btn" id="result-secondary-btn">返回选关</button>
              <button class="primary-btn" id="result-primary-btn">下一关</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
