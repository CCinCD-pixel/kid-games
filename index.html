<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>爸爸的游戏乐园</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="游戏乐园">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 0;
            /* iOS safe area */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 30px 20px 10px;
        }

        .header h1 {
            font-size: clamp(1.6rem, 6vw, 2.4rem);
            font-weight: 900;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-top: 6px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 20px 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .game-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                padding: 24px;
            }
        }

        .game-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            aspect-ratio: 1;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .game-card:active {
            transform: scale(0.95);
        }

        .game-card:hover {
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.2);
        }

        .game-card .icon {
            font-size: clamp(2.5rem, 10vw, 3.5rem);
            margin-bottom: 8px;
            line-height: 1;
        }

        .game-card .name {
            font-size: clamp(0.95rem, 3.5vw, 1.15rem);
            font-weight: 700;
            text-align: center;
        }

        .game-card .tag {
            font-size: 0.7rem;
            opacity: 0.5;
            margin-top: 4px;
        }

        /* 即将推出的卡片 */
        .game-card.coming-soon {
            opacity: 0.35;
            cursor: default;
            border-style: dashed;
        }
        .game-card.coming-soon:active {
            transform: none;
        }

        .footer {
            text-align: center;
            padding: 30px 20px;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎮 爸爸的游戏乐园</h1>
        <p>和爸爸一起玩，一起成长</p>
    </div>

    <div class="game-grid">
        <a href="./memory-matrix/index.html" class="game-card">
            <div class="icon">🧩</div>
            <div class="name">记忆方块</div>
            <div class="tag">练记忆</div>
        </a>

        <a href="./emoji-match/index.html" class="game-card">
            <div class="icon">🍓</div>
            <div class="name">表情消消乐</div>
            <div class="tag">练观察</div>
        </a>

        <a href="./number-adventure/index.html" class="game-card">
            <div class="icon">🔢</div>
            <div class="name">数字探险家</div>
            <div class="tag">练数感</div>
        </a>

        <a href="./sokoban/index.html" class="game-card">
            <div class="icon">📦</div>
            <div class="name">推箱子</div>
            <div class="tag">练规划</div>
        </a>

        <a href="./chess/index.html" class="game-card">
            <div class="icon">♟️</div>
            <div class="name">国际象棋</div>
            <div class="tag">练策略</div>
        </a>

        <a href="./checkers/index.html" class="game-card">
            <div class="icon">⭕</div>
            <div class="name">国际跳棋</div>
            <div class="tag">练策略</div>
        </a>

        <a href="./snake-battle/index.html" class="game-card">
            <div class="icon">🐍</div>
            <div class="name">贪吃蛇大作战</div>
            <div class="tag">练反应</div>
        </a>

        <a href="./military-chess/index.html" class="game-card">
            <div class="icon">⚔️</div>
            <div class="name">军棋</div>
            <div class="tag">练策略</div>
        </a>
    </div>

    <div class="footer">
        Made with ❤️ by Dad
    </div>

    <script>
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
